<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Perspective Box Trainer V6.1</title>
<style>
    body {
        margin: 0;
        background: #1e1e1e;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
        touch-action: manipulation;
    }
    #ui {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.9);
        padding: 15px;
        border-radius: 12px;
        z-index: 100;
        user-select: none;
        min-width: 280px;
        box-shadow: 0 4px 25px rgba(0,0,0,0.6);
    }
    button {
        background: #333;
        color: white;
        border: none;
        padding: 10px 14px;
        margin: 4px 2px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1em;
    }
    button.active {
        background: #0a0;
        font-weight: bold;
    }
    .row { display: flex; flex-wrap: wrap; gap: 4px; }
    #timer {
        font-size: 1.9em;
        font-weight: bold;
        color: #0f0;
        margin: 12px 0;
        text-align: center;
    }
    canvas { display: block; }
</style>
</head>
<body>
<div id="ui">
    <b>Perspective Box Trainer</b><br><br>
    
    <strong>Сложность:</strong><br>
    <div class="row" id="mode-buttons">
        <button data-mode="1">1 — Лёгкий</button>
        <button data-mode="2" class="active">2 — Средний</button>
        <button data-mode="3">3 — Сложный</button>
    </div><br>
    
    <strong>Таймер:</strong><br>
    <div class="row" id="duration-buttons">
        <button data-sec="5">5s</button>
        <button data-sec="10" class="active">10s</button>
        <button data-sec="15">15s</button>
        <button data-sec="30">30s</button>
    </div>
    <button id="toggle-timer" style="width:100%; margin-top:6px;">⏸ Отключить таймер</button>
    
    <div id="timer">10s</div>
    
    <div class="row">
        <button id="new-box" style="flex:1; background:#0066ff;">Новый куб (Space / N)</button>
        <button id="pause-btn" style="flex:1;">⏸ Пауза</button>
    </div>
    
    <div style="margin-top:10px; font-size:0.95em; opacity:0.8;">
        Кубов за сессию: <span id="count">0</span>
    </div>
</div>
<canvas id="cv"></canvas>

<script>
// ... (тот же рабочий код, но с добавленными кнопками)
const canvas = document.getElementById("cv");
const ctx = canvas.getContext("2d");
const timerEl = document.getElementById("timer");
const countEl = document.getElementById("count");

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

let mode = 2;
let auto = true;
let timerEnabled = true;
let isPaused = false;
let nextTime = Date.now() + 10000;
let timerDuration = 10000;
let boxCount = 0;

const edges = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
const faces = [[0,1,2,3],[5,4,7,6],[0,4,5,1],[3,2,6,7],[0,3,7,4],[1,5,6,2]];

let projected = [];

function rotX(p, a) { const [x,y,z]=p; return [x, y*Math.cos(a)-z*Math.sin(a), y*Math.sin(a)+z*Math.cos(a)]; }
function rotY(p, a) { const [x,y,z]=p; return [x*Math.cos(a)+z*Math.sin(a), y, -x*Math.sin(a)+z*Math.cos(a)]; }

function generate() {
    const sx = 80 + Math.random() * 140;
    const sy = 80 + Math.random() * 140;
    const sz = 80 + Math.random() * 140;

    let verts = [[-sx,-sy,-sz],[sx,-sy,-sz],[sx,sy,-sz],[-sx,sy,-sz],[-sx,-sy,sz],[sx,-sy,sz],[sx,sy,sz],[-sx,sy,sz]];

    let yaw = 0, pitch = 0;
    if (mode === 1) { yaw = (Math.random()-0.5)*0.3; pitch = (Math.random()-0.5)*0.25; }
    else if (mode === 2) { yaw = (Math.random()<0.5 ? -1 : 1) * (0.5 + Math.random()*1.1); pitch = (Math.random()-0.5)*0.35; }
    else { yaw = (Math.random()<0.5 ? -1 : 1) * (0.6 + Math.random()*1.2); pitch = (Math.random()<0.5 ? -1 : 1) * (0.4 + Math.random()*0.9); }

    projected = verts.map(v => {
        v = rotY(v, yaw);
        v = rotX(v, pitch);
        const z = v[2] + 720;
        const f = 720 / z;
        return { x: canvas.width/2 + v[0]*f, y: canvas.height/2 + v[1]*f, z };
    });

    if (timerEnabled && !isPaused) nextTime = Date.now() + timerDuration;
    boxCount++;
    countEl.textContent = boxCount;
}

function isFaceVisible(face) {
    const a = projected[face[0]], b = projected[face[1]], c = projected[face[2]];
    const vx = b.x - a.x, vy = b.y - a.y;
    const wx = c.x - a.x, wy = c.y - a.y;
    return (vx * wy - vy * wx) > 0;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const visibleFaces = faces.filter(isFaceVisible);

    for (let [a, b] of edges) {
        let hidden = !visibleFaces.some(face => face.includes(a) && face.includes(b));
        ctx.beginPath();
        ctx.lineWidth = 3.5;
        if (hidden) {
            ctx.setLineDash([9, 7]);
            ctx.strokeStyle = "#555";
        } else {
            ctx.setLineDash([]);
            ctx.strokeStyle = "#fff";
        }
        ctx.moveTo(projected[a].x, projected[a].y);
        ctx.lineTo(projected[b].x, projected[b].y);
        ctx.stroke();
    }

    if (timerEnabled && !isPaused) {
        const remaining = Math.max(0, Math.ceil((nextTime - Date.now()) / 1000));
        timerEl.textContent = remaining + "s";
        timerEl.style.color = remaining <= 3 ? "#f44" : "#0f0";
        if (Date.now() > nextTime) generate();
    } else if (!timerEnabled) {
        timerEl.textContent = "∞";
        timerEl.style.color = "#aaa";
    } else {
        timerEl.textContent = "ПАУЗА";
        timerEl.style.color = "#ff0";
    }

    requestAnimationFrame(draw);
}

// Кнопки
document.getElementById("new-box").addEventListener("click", generate);

document.querySelectorAll("#mode-buttons button").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll("#mode-buttons button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        mode = parseInt(btn.dataset.mode);
        generate();
    });
});

document.querySelectorAll("#duration-buttons button").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll("#duration-buttons button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        timerDuration = parseInt(btn.dataset.sec) * 1000;
        if (timerEnabled) nextTime = Date.now() + timerDuration;
    });
});

document.getElementById("toggle-timer").addEventListener("click", () => {
    timerEnabled = !timerEnabled;
    const btn = document.getElementById("toggle-timer");
    btn.textContent = timerEnabled ? "⏸ Отключить таймер" : "▶ Включить таймер";
});

document.getElementById("pause-btn").addEventListener("click", () => {
    if (timerEnabled) isPaused = !isPaused;
});

// Клавиатура (для ПК)
document.addEventListener("keydown", e => {
    if (e.code === "Space" || e.key.toLowerCase() === "n") generate();
    if (e.key === "1" || e.key === "2" || e.key === "3") {
        mode = parseInt(e.key);
        document.querySelectorAll("#mode-buttons button").forEach(b => {
            b.classList.toggle("active", parseInt(b.dataset.mode) === mode);
        });
        generate();
    }
    if (e.key.toLowerCase() === "t") {
        if (timerEnabled) isPaused = !isPaused;
    }
});

generate();
draw();
</script>
</body>
</html>
